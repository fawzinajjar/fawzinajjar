<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fawzi Najjar</title>
  <style>
    /* ============================================================
       Brand tokens
       ============================================================ */
    :root {
      --brand:          rgb(42, 83, 47);        /* #2A532F deep forest green — name & key accents */
      --brand-deep:     rgb(32, 63, 36);        /* hover/active states */
      --brand-tint:     rgba(42, 83, 47, 0.08); /* glass background fill */
      --brand-hairline: rgba(42, 83, 47, 0.15); /* bottom border */

      --header-pad: clamp(16px, 4vw, 48px);     /* comfortable horizontal padding */
      --display-font: "Tw Cen MT", "Century Gothic", "Futura", "Avenir Next", "Avenir", sans-serif; /* brand display font */

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* premium decelerate */
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    /* ============================================================
       Sticky frosted-glass header
       ============================================================ */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      width: 100%;
      min-height: clamp(220px, 40vh, 440px);   /* generous, breathing space */

      display: grid;
      place-items: center;          /* name sits dead-center, perfectly balanced */
      padding: clamp(24px, 5vh, 56px) var(--header-pad);

      /* Apple-style frosted glass: near-white base with a whisper of green */
      background:
        linear-gradient(var(--brand-tint), var(--brand-tint)),
        rgba(255, 255, 255, 0.66);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);

      /* Ultra-thin hairline for definition */
      border-bottom: 1px solid var(--brand-hairline);

      /* Soft fade: lower ~22% melts into the page */
      -webkit-mask-image: linear-gradient(to bottom, black 78%, transparent 100%);
              mask-image: linear-gradient(to bottom, black 78%, transparent 100%);
    }

    /* Minimal Contact affordance, tucked into the top-right corner */
    .header-corner {
      position: absolute;
      top: clamp(16px, 3vh, 28px);
      right: var(--header-pad);
    }

    /* ============================================================
       Live name component (swappable slot)
       --------------------------------------------------------
       The .name-slot holds one active "state" at a time. Each
       state is a positioned layer; swapping = fade the old layer
       out while fading the new one in. To extend later:
         1. Build a new element with class "name-state".
         2. Append it to .name-slot, then toggle the "is-active"
            class off the current state and on the new one.
         3. The CSS transition handles the crossfade.
       ============================================================ */
    .name-slot {
      position: relative;
      display: inline-grid;          /* layers stack in one grid cell */
      font-family: var(--display-font);
      font-weight: 700;              /* bold */
      font-size: clamp(2.8rem, 9vw, 6rem);
      letter-spacing: 0.01em;
      line-height: 1.05;
      color: var(--brand);
      white-space: nowrap;
      text-align: center;
    }
    .name-state {
      grid-area: 1 / 1;              /* every state occupies the same cell */
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .name-state.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Entry effect: per-letter reveal.
       JS splits .name-line into one .name-letter per character, each
       carrying a --i index so CSS can stagger the animation. Letters
       fade up while a blur clears — a clean, premium "settle". */
    .name-line { display: block; }
    .name-letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(0.5em);
      filter: blur(12px);
      will-change: transform, filter, opacity;
    }
    .name-letter.is-space { width: 0.28em; }
    .name-state.reveal .name-letter {
      animation: letterIn 0.85s var(--ease-out) both;
      animation-delay: calc(var(--i) * 55ms);
    }
    @keyframes letterIn {
      to { opacity: 1; transform: none; filter: blur(0); }
    }

    /* Accent line: a hairline that draws in beneath the name once the
       letters have landed — the finishing flourish. */
    .name-rule {
      height: 2px;
      width: 100%;
      margin-top: clamp(10px, 1.6vh, 18px);
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--brand) 50%, transparent);
      transform: scaleX(0);
      opacity: 0;
    }
    .name-state.reveal .name-rule {
      animation: ruleIn 0.9s var(--ease-out) both;
      /* starts after the last letter is on its way in */
      animation-delay: var(--rule-delay, 0.8s);
    }
    @keyframes ruleIn {
      to { transform: scaleX(1); opacity: 0.45; }
    }

    @media (prefers-reduced-motion: reduce) {
      .name-letter { opacity: 1; transform: none; filter: none; animation: none; }
      .name-rule { transform: scaleX(1); opacity: 0.45; animation: none; }
    }

    /* ============================================================
       Contact button
       ============================================================ */
    .contact-btn {
      font: inherit;
      font-weight: 600;
      font-size: 0.92rem;
      letter-spacing: 0.01em;
      color: var(--brand);
      background: transparent;
      border: 1px solid var(--brand-hairline);
      border-radius: 999px;
      padding: 9px 20px;
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, transform 0.05s ease;
    }
    .contact-btn:hover,
    .contact-btn:focus-visible {
      background: var(--brand);
      border-color: var(--brand);
      color: #ffffff;
    }
    .contact-btn:active { transform: translateY(1px); }
    .contact-btn:focus-visible {
      outline: 2px solid var(--brand-deep);
      outline-offset: 2px;
    }

    /* ============================================================
       Contact overlay / modal
       --------------------------------------------------------
       Uses the native <dialog> element: showModal() gives us
       focus trapping, Esc-to-close, aria-modal semantics, and
       focus return to the invoker for free. We add backdrop-click
       close and styling on top. To extend: drop content into
       .dialog-body.
       ============================================================ */
    .contact-dialog {
      border: none;
      border-radius: 16px;
      padding: 0;
      width: min(480px, calc(100vw - 32px));   /* near-full-width on mobile */
      background: #ffffff;
      color: #1a1a1a;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }
    .contact-dialog::backdrop {
      background: rgba(15, 23, 42, 0.45);       /* dim the page behind */
      -webkit-backdrop-filter: blur(2px);
              backdrop-filter: blur(2px);
    }
    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--brand-hairline);
    }
    .dialog-title {
      margin: 0;
      font-family: var(--display-font);
      font-size: 1.25rem;
      color: var(--brand);
    }
    .dialog-close {
      font: inherit;
      font-size: 1.4rem;
      line-height: 1;
      color: var(--brand);
      background: transparent;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .dialog-close:hover,
    .dialog-close:focus-visible { background: var(--brand-tint); }
    .dialog-close:focus-visible { outline: 2px solid var(--brand-deep); outline-offset: 2px; }

    .dialog-body {
      padding: 24px;
      min-height: 80px;     /* placeholder space for contact info — fill later */
    }

    /* ============================================================
       Mobile
       ============================================================ */
    @media (max-width: 600px) {
      .site-header { min-height: clamp(200px, 44vh, 360px); }
      .contact-btn {
        padding: 7px 15px;
        font-size: 0.82rem;
      }
    }

    /* Demo page content so the sticky header + fade are visible */
    .page-content {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px var(--header-pad) 120px;
      line-height: 1.7;
      color: #475569;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <!-- Centerpiece: live, swappable name component.
         JS splits data-text into per-letter spans and triggers the
         staggered reveal. Add more .name-state layers later and toggle
         .is-active to crossfade between them. -->
    <div class="name-slot" aria-label="Fawzi Najjar">
      <span class="name-state is-active" data-text="Fawzi Najjar" aria-hidden="true">
        <span class="name-line"></span>
        <span class="name-rule" aria-hidden="true"></span>
      </span>
    </div>

    <!-- Minimal Contact affordance, top-right corner -->
    <div class="header-corner">
      <button type="button" class="contact-btn" id="contactBtn" aria-haspopup="dialog">
        Contact
      </button>
    </div>
  </header>

  <!-- Contact overlay (native modal dialog) -->
  <dialog class="contact-dialog" id="contactDialog" aria-labelledby="contactTitle">
    <div class="dialog-header">
      <h2 class="dialog-title" id="contactTitle">Contact</h2>
      <button type="button" class="dialog-close" id="dialogClose" aria-label="Close contact dialog">&times;</button>
    </div>
    <div class="dialog-body">
      <!-- Contact info placeholder — fill in later -->
    </div>
  </dialog>

  <main class="page-content">
    <p>Page content goes here. Scroll to see the frosted header stay pinned with its soft bottom fade.</p>
  </main>

  <script>
    // ============================================================
    // Contact overlay controller
    // Native <dialog>.showModal() handles: focus trap, Esc-to-close,
    // aria-modal, and focus return to the invoker. We layer on
    // backdrop-click-to-close.
    // ============================================================
    (function () {
      const dialog = document.getElementById("contactDialog");
      const openBtn = document.getElementById("contactBtn");
      const closeBtn = document.getElementById("dialogClose");

      openBtn.addEventListener("click", () => dialog.showModal());
      closeBtn.addEventListener("click", () => dialog.close());

      // Click on the dimmed backdrop (outside the panel) closes it.
      dialog.addEventListener("click", (e) => {
        const r = dialog.getBoundingClientRect();
        const inPanel =
          e.clientX >= r.left && e.clientX <= r.right &&
          e.clientY >= r.top  && e.clientY <= r.bottom;
        if (!inPanel) dialog.close();
      });
    })();

    // ============================================================
    // Name reveal — splits the active name into per-letter spans and
    // triggers the staggered fade/blur-clear, then draws the accent
    // line. CSS handles the motion; we just build the letters, set the
    // stagger index (--i), and time the rule (--rule-delay).
    // Honors prefers-reduced-motion (CSS shows everything instantly).
    // ============================================================
    (function revealName() {
      const state = document.querySelector(".name-state.is-active");
      if (!state) return;
      const line = state.querySelector(".name-line");
      const rule = state.querySelector(".name-rule");
      const full = state.getAttribute("data-text") || "";
      if (!line) return;

      const STEP = 0.055;         // seconds between each letter (matches CSS)
      const chars = [...full];
      line.textContent = "";

      chars.forEach((ch, i) => {
        const span = document.createElement("span");
        span.className = "name-letter";
        span.style.setProperty("--i", i);
        if (ch === " ") {
          span.classList.add("is-space");
          span.innerHTML = "&nbsp;";
        } else {
          span.textContent = ch;
        }
        line.appendChild(span);
      });

      // Draw the accent line just after the final letter begins settling.
      if (rule) {
        rule.style.setProperty("--rule-delay", (chars.length * STEP + 0.15).toFixed(2) + "s");
      }

      // Kick the animation on the next frame so styles apply cleanly.
      requestAnimationFrame(() => state.classList.add("reveal"));
    })();

    // ============================================================
    // Live name component (mechanism only)
    // ------------------------------------------------------------
    // swapName(html) crossfades the name slot to a new state.
    // Cycle logic + message list come later; expose it on window
    // so it's easy to drive from elsewhere.
    // ============================================================
    window.swapName = function swapName(html) {
      const slot = document.querySelector(".name-slot");
      if (!slot) return;
      const current = slot.querySelector(".name-state.is-active");
      const next = document.createElement("span");
      next.className = "name-state";
      next.innerHTML = html;
      slot.appendChild(next);
      // Force reflow so the opacity transition runs on the new layer.
      void next.offsetWidth;
      next.classList.add("is-active");
      if (current) {
        current.classList.remove("is-active");
        current.addEventListener("transitionend", () => current.remove(), { once: true });
      }
    };
  </script>
</body>
</html>
